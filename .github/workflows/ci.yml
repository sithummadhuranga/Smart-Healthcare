# ============================================================
# CI Pipeline — runs on every push / PR to main or develop
#
# Jobs:
#   lint-and-typecheck  — ESLint + tsc --noEmit for each service
#   build               — npm run build (tsc) for each Node service
#   docker-build        — builds every Docker image to verify Dockerfiles
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ── Validate all lockfiles (runs once, gates all other jobs) ─────────────
  validate-dependencies:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Validate all lockfiles
        run: node scripts/validate-lockfiles.js

  # ── Lint & type-check every Node.js service ──────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: validate-dependencies
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - telemedicine-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.service }}-
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: TypeScript type-check
        working-directory: ${{ matrix.service }}
        run: npm run typecheck

  # ── Build every Node.js service ───────────────────────────────────────────
  build-node-services:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [validate-dependencies, lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - telemedicine-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.service }}-
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Build TypeScript
        working-directory: ${{ matrix.service }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-dist
          path: ${{ matrix.service }}/dist/
          retention-days: 7

  # ── Lint Python AI service ────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ai-symptom-service)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Flake8 lint
        working-directory: ai-symptom-service
        run: flake8 . --max-line-length=100 --exclude=__pycache__

      - name: Black format check
        working-directory: ai-symptom-service
        run: black --check --line-length 100 .

  # ── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate-dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-frontend-
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite app
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Validate Kubernetes YAML ──────────────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Validate all K8s manifests
        run: bash ./scripts/validate-k8s.sh

  # ── Docker build (verify all Dockerfiles) ────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-node-services
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 3000
          - service: auth-service
            port: 3001
          - service: patient-service
            port: 3002
          - service: doctor-service
            port: 3003
          - service: appointment-service
            port: 3004
          - service: telemedicine-service
            port: 3005
          - service: payment-service
            port: 3006
          - service: notification-service
            port: 3007
          - service: ai-symptom-service
            port: 8000
          - service: frontend
            port: 80

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: healthcare/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
