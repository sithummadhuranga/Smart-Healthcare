# ============================================================
# CD Pipeline — builds and pushes Docker images to GHCR
# Runs ONLY on pushes to main (after CI passes)
#
# Required GitHub Secrets:
#   GHCR_TOKEN — Personal Access Token with write:packages scope
#              OR use ${{ secrets.GITHUB_TOKEN }} for auto-auth
# ============================================================
name: CD

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  # Replace with your GitHub org/username (lowercase)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/healthcare

jobs:
  # ── Only run if CI workflow passed ───────────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.result }}
    steps:
      - name: Check if triggered from CI success
        id: check
        run: echo "result=true" >> $GITHUB_OUTPUT

  # ── Build and push all Docker images to GHCR ────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - telemedicine-service
          - payment-service
          - notification-service
          - ai-symptom-service
          - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Minikube (self-hosted runner) ───────────────────────────────
  # NOTE: For student use, this job performs a dry-run deployment summary.
  # To enable actual Minikube deployment, add a self-hosted runner to the repo.
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print deployment manifest list
        run: |
          echo "=== Images built and pushed to GHCR ==="
          echo "Tag: latest (main branch)"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "=== Kubernetes apply command ==="
          echo "kubectl apply -f k8s/configmap.yaml"
          echo "kubectl apply -f k8s/secret.yaml   # (you must create from secret.yaml.example)"
          echo "kubectl apply -f k8s/mongodb.yaml"
          echo "kubectl apply -f k8s/postgres.yaml"
          echo "kubectl apply -f k8s/rabbitmq.yaml"
          echo "kubectl apply -f k8s/auth-service.yaml"
          echo "kubectl apply -f k8s/patient-service.yaml"
          echo "kubectl apply -f k8s/doctor-service.yaml"
          echo "kubectl apply -f k8s/appointment-service.yaml"
          echo "kubectl apply -f k8s/telemedicine-service.yaml"
          echo "kubectl apply -f k8s/payment-service.yaml"
          echo "kubectl apply -f k8s/notification-service.yaml"
          echo "kubectl apply -f k8s/ai-symptom-service.yaml"
          echo "kubectl apply -f k8s/api-gateway.yaml"
          echo "kubectl apply -f k8s/frontend.yaml"
          echo "kubectl apply -f k8s/ingress.yaml"
