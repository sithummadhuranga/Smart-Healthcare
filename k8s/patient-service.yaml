# ============================================================
# Patient Service — Deployment + Service
# Port: 3002  |  Depends on: MongoDB
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: default
  labels:
    app: patient-service
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."; sleep 2;
              done
      containers:
        - name: patient-service
          image: healthcare/patient-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: default
  labels:
    app: patient-service
spec:
  selector:
    app: patient-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
