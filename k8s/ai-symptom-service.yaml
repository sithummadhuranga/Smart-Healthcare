# ============================================================
# AI Symptom Service — Deployment + Service
# Port: 8000  |  Python FastAPI  |  Stateless
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: default
  labels:
    app: ai-symptom-service
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: healthcare/ai-symptom-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /api/ai/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ai/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
  namespace: default
  labels:
    app: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
