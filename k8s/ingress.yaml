# ============================================================
# Kubernetes Ingress — Single entry point for all traffic
# Host: healthcare.local (add to /etc/hosts → minikube ip)
#
# Setup:
#   minikube addons enable ingress
#   echo "$(minikube ip) healthcare.local" | sudo tee -a /etc/hosts
#   kubectl apply -f k8s/ingress.yaml
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-ingress
  namespace: default
  labels:
    app: healthcare-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"          # Allow large file uploads
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://healthcare.local"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: healthcare.local
      http:
        paths:
          # All API calls go to API Gateway (which routes to individual services)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # Frontend (React SPA) — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
